<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <title>Self-Harness</title>
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <meta name="description" content="Harness Engineering 快速入门与实践">
    <meta name="viewport"
        content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@latest/lib/themes/vue.css">
    <style>
        /* 语言切换按钮样式 */
        .lang-switch {
            position: fixed;
            top: 20px;
            right: 80px;
            z-index: 999;
        }
        .lang-switch button {
            background: #42b983;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.3s;
        }
        .lang-switch button:hover {
            background: #33a06f;
        }

        /* Giscus 评论区样式 */
        .giscus-container {
            margin-top: 60px;
            padding-top: 40px;
            border-top: 1px solid #eee;
        }

        .giscus-toggle {
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            padding: 15px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 8px;
            margin-bottom: 20px;
            transition: all 0.3s ease;
            box-shadow: 0 2px 8px rgba(102, 126, 234, 0.2);
        }

        .giscus-toggle:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }

        .giscus-toggle-title {
            font-size: 1.3em;
            font-weight: 600;
            color: white;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .giscus-toggle-icon {
            font-size: 1.2em;
            transition: transform 0.3s ease;
            color: white;
        }

        .giscus-toggle-icon.expanded {
            transform: rotate(180deg);
        }

        .giscus-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease-out, opacity 0.3s ease;
            opacity: 0;
        }

        .giscus-content.expanded {
            max-height: 2000px;
            opacity: 1;
            transition: max-height 0.5s ease-in, opacity 0.4s ease;
        }

        .giscus-hint {
            font-size: 0.9em;
            color: rgba(255, 255, 255, 0.9);
            margin: 0;
        }

        /* 暗黑模式样式 */
        :root {
            --dark-bg: #1a1a1a;
            --dark-text: #c4c4c4;
            --dark-sidebar: #141414;
            --dark-code-bg: #2b2b2b;
            --dark-border: #333;
            --theme-color: #42b983;
        }

        body.dark-mode {
            background-color: var(--dark-bg);
            color: var(--dark-text);
        }

        body.dark-mode .sidebar {
            background-color: var(--dark-sidebar);
            border-right: 1px solid var(--dark-border);
            color: var(--dark-text);
        }
        body.dark-mode .sidebar-nav li a {
            color: #999;
        }
        body.dark-mode .sidebar-nav li.active > a {
            color: var(--theme-color);
            border-right: 2px solid var(--theme-color);
        }

        body.dark-mode pre {
            background-color: var(--dark-code-bg) !important;
        }
        body.dark-mode code {
            background-color: var(--dark-code-bg) !important;
            color: #e0e0e0 !important;
        }
        body.dark-mode .markdown-section code {
            color: #f08d49;
            background-color: rgba(255,255,255,0.1);
        }

        body.dark-mode h1, body.dark-mode h2, body.dark-mode h3, body.dark-mode h4 {
            color: #e0e0e0;
        }
        body.dark-mode blockquote {
            color: #999;
            background: rgba(255,255,255,0.05);
            border-left-color: var(--theme-color);
        }

        body.dark-mode .markdown-section tr:nth-child(2n) {
            background-color: rgba(255,255,255,0.03);
        }
        body.dark-mode .markdown-section td,
        body.dark-mode .markdown-section th {
            border-color: var(--dark-border);
        }

        body.dark-mode .mermaid {
            filter: invert(1) hue-rotate(180deg);
        }

        body.dark-mode .giscus-container {
            border-top: 1px solid var(--dark-border);
        }

        .sidebar-toggle-btn {
            cursor: pointer;
            display: block;
            text-align: center;
            padding: 10px 0;
            margin: 0 15px 10px 15px;
            font-weight: bold;
            font-size: 14px;
            border-radius: 4px;
            background-color: rgba(0,0,0,0.05);
            color: #505d6b;
            border: 1px solid rgba(0,0,0,0.05);
            transition: all 0.3s;
        }
        body.dark-mode .sidebar-toggle-btn {
            background-color: rgba(255,255,255,0.1);
            color: #ccc;
            border: 1px solid #444;
        }
        .sidebar-toggle-btn:hover {
            background-color: var(--theme-color);
            color: white;
        }
    </style>
</head>

<body>
    <!-- 语言切换按钮（仅保留UI，当前仅中文内容） -->
    <div class="lang-switch">
        <button id="langBtn" onclick="switchLanguage()">English</button>
    </div>
    <div id="app"></div>
    <script src="//cdn.jsdelivr.net/npm/mermaid@8.0.0-rc.8/dist/mermaid.min.js"></script>
    <script>
        window.$docsify = {
            name: 'Self-Harness',
            repo: 'https://github.com/datawhalechina/self-harness',
            loadSidebar: true,
            auto2top: true,
            subMaxLevel: 3,
            relativePath: false,
            pagination: {
                previousText: '上一章节',
                nextText: '下一章节',
            },
            count: {
                countable: true,
                fontsize: '0.9em',
                color: 'rgb(90,90,90)',
                language: 'chinese'
            },
            plugins: [
                // 暗黑模式开关插件
                function(hook, vm) {
                    hook.doneEach(function() {
                        const sidebar = document.querySelector('.sidebar-nav');
                        if (!sidebar || document.querySelector('.sidebar-toggle-btn')) return;

                        const btn = document.createElement('div');
                        btn.className = 'sidebar-toggle-btn';

                        const savedTheme = localStorage.getItem('theme-mode');
                        if (savedTheme === 'dark') {
                            document.body.classList.add('dark-mode');
                            btn.textContent = '🌙 切换亮色';
                        } else {
                            btn.textContent = '☀️ 切换暗色';
                        }

                        btn.onclick = function() {
                            document.body.classList.toggle('dark-mode');
                            const isDark = document.body.classList.contains('dark-mode');
                            localStorage.setItem('theme-mode', isDark ? 'dark' : 'light');
                            btn.textContent = isDark ? '🌙 切换亮色' : '☀️ 切换暗色';

                            const iframe = document.querySelector('iframe.giscus-frame');
                            if (iframe) {
                                iframe.contentWindow.postMessage({
                                    giscus: {
                                        setConfig: {
                                            theme: isDark ? 'dark' : 'light'
                                        }
                                    }
                                }, 'https://giscus.app');
                            }
                        };

                        sidebar.insertBefore(btn, sidebar.firstChild);
                    });
                },

                // Giscus 评论区插件
                function(hook, vm) {
                    hook.beforeEach(function(content) {
                        window.$docsify.pagination.previousText = '上一章节';
                        window.$docsify.pagination.nextText = '下一章节';
                        return content;
                    });

                    hook.doneEach(function() {
                        const currentPath = vm.route.path;
                        const isChapterPage = currentPath.includes('chapter') || currentPath.includes('Chapter') || (currentPath.includes('第') && currentPath.includes('章'));

                        if (!isChapterPage) {
                            return;
                        }

                        const oldGiscus = document.querySelector('.giscus-container');
                        if (oldGiscus) {
                            oldGiscus.remove();
                        }

                        const giscusContainer = document.createElement('div');
                        giscusContainer.className = 'giscus-container';

                        const isDarkMode = document.body.classList.contains('dark-mode');

                        const toggleButton = document.createElement('div');
                        toggleButton.className = 'giscus-toggle';

                        const titleDiv = document.createElement('div');
                        titleDiv.className = 'giscus-toggle-title';
                        titleDiv.innerHTML = '💬 讨论与提问';

                        const hintText = document.createElement('p');
                        hintText.className = 'giscus-hint';
                        hintText.textContent = '点击展开/收起';

                        const iconSpan = document.createElement('span');
                        iconSpan.className = 'giscus-toggle-icon';
                        iconSpan.textContent = '▼';

                        const titleWrapper = document.createElement('div');
                        titleWrapper.appendChild(titleDiv);
                        titleWrapper.appendChild(hintText);

                        toggleButton.appendChild(titleWrapper);
                        toggleButton.appendChild(iconSpan);

                        const contentDiv = document.createElement('div');
                        contentDiv.className = 'giscus-content';

                        const giscusScript = document.createElement('script');
                        giscusScript.src = 'https://giscus.app/client.js';
                        // TODO: 部署前请到 https://giscus.app 生成 self-harness 专属的 repo-id 与 category-id 并替换下方值
                        giscusScript.setAttribute('data-repo', 'datawhalechina/hello-agents');
                        giscusScript.setAttribute('data-repo-id', 'R_kgDOPrUECg');
                        giscusScript.setAttribute('data-category', '💬 Exercises & Q&A');
                        giscusScript.setAttribute('data-category-id', 'DIC_kwDOPrUECs4Cxfyu');
                        giscusScript.setAttribute('data-mapping', 'pathname');
                        giscusScript.setAttribute('data-strict', '0');
                        giscusScript.setAttribute('data-reactions-enabled', '1');
                        giscusScript.setAttribute('data-emit-metadata', '0');
                        giscusScript.setAttribute('data-input-position', 'top');
                        giscusScript.setAttribute('data-theme', isDarkMode ? 'dark' : 'light');
                        giscusScript.setAttribute('data-lang', 'zh-CN');
                        giscusScript.setAttribute('data-loading', 'lazy');
                        giscusScript.crossOrigin = 'anonymous';
                        giscusScript.async = true;

                        contentDiv.appendChild(giscusScript);

                        giscusContainer.appendChild(toggleButton);
                        giscusContainer.appendChild(contentDiv);

                        let isExpanded = false;
                        toggleButton.addEventListener('click', function() {
                            isExpanded = !isExpanded;
                            if (isExpanded) {
                                contentDiv.classList.add('expanded');
                                iconSpan.classList.add('expanded');
                            } else {
                                contentDiv.classList.remove('expanded');
                                iconSpan.classList.remove('expanded');
                            }
                        });

                        const article = document.querySelector('article.markdown-section');
                        if (article) {
                            article.appendChild(giscusContainer);
                        }
                    });
                }
            ]
        }
    </script>
    <script src="//cdn.jsdelivr.net/npm/docsify@latest/lib/docsify.min.js"></script>
    <!-- code render -->
    <script src="//cdn.jsdelivr.net/npm/prismjs@latest/components/prism-bash.js"></script>
    <script src="//cdn.jsdelivr.net/npm/prismjs@latest/components/prism-python.js"></script>
    <script src="//cdn.jsdelivr.net/npm/docsify-pagination@latest/dist/docsify-pagination.min.js"></script>
    <script src="//cdn.jsdelivr.net/npm/docsify-copy-code"></script>
    <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/zoom-image.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/katex@latest/dist/katex.min.js"></script>
    <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/katex@latest/dist/katex.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/marked@3"></script>
    <script src="//cdn.jsdelivr.net/npm/docsify-katex@latest/dist/docsify-katex.js"></script>
    <script src="//unpkg.com/docsify-count/dist/countable.js"></script>

    <script>
        function switchLanguage() {
            alert('英文版筹备中，敬请期待！');
        }

        window.addEventListener('load', function() {
            const langBtn = document.getElementById('langBtn');
            if (langBtn) {
                langBtn.textContent = 'English';
            }
        });
    </script>
</body>

</html>
